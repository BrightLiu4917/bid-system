name: ${COMPOSE_PROJECT_NAME:-bidding-system}

services:
  mysql:
    image: mysql:8.0
    container_name: ${APP_NAME:-bidding-system}-mysql
    restart: always
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      [
        "mysqld",
        "--default-authentication-plugin=mysql_native_password",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci"
      ]
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./data/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - app-net

  redis:
    image: redis:7.2-alpine
    container_name: ${APP_NAME:-bidding-system}-redis
    restart: always
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      [
        "sh",
        "-c",
        "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""
      ]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - app-net

  backend:
    image: eclipse-temurin:17-jre
    container_name: ${APP_NAME:-bidding-system}-backend
    restart: always
    working_dir: /app
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_OPTS: ${JAVA_OPTS:-}
      SPRING_PROFILES_ACTIVE: prod
      BIA_API_PORT: ${BIA_API_PORT:-8889}
      BIA_DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DB}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      BIA_DB_USERNAME: ${BIA_DB_USERNAME}
      BIA_DB_PASSWORD: ${BIA_DB_PASSWORD}
      BIA_REDIS_HOST: redis
      BIA_REDIS_PORT: 6379
      BIA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      BIA_REDIS_DATABASE: ${BIA_REDIS_DATABASE:-1}
      BIA_REDIS_TIMEOUT: ${BIA_REDIS_TIMEOUT:-3000ms}
      BIA_UPLOAD_ROOT: ${BIA_UPLOAD_ROOT:-/app/files}
      BIA_JWT_SECRET: ${BIA_JWT_SECRET}
      BIA_MAIL_CONFIG_SECRET: ${BIA_MAIL_CONFIG_SECRET}
      BIA_JWT_EXPIRE_SECONDS: ${BIA_JWT_EXPIRE_SECONDS:-86400}
      BIA_ADMIN_LOGIN_URL: ${BIA_ADMIN_LOGIN_URL:-/#/login}
      BIA_AUTH_SMS_TEST_BYPASS_ENABLED: ${BIA_AUTH_SMS_TEST_BYPASS_ENABLED:-false}
      BIA_AUTH_SMS_TEST_BYPASS_CODE: ${BIA_AUTH_SMS_TEST_BYPASS_CODE:-disabled}
    volumes:
      - ./release/backend/app.jar:/app/app.jar:ro
      - ./data/files:/app/files
    command:
      [
        "sh",
        "-c",
        "java $${JAVA_OPTS:-} -jar /app/app.jar"
      ]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    container_name: ${APP_NAME:-bidding-system}-nginx
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./release/frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
