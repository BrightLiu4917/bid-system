name: control-system-checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax
        run: bash -n scripts/*.sh scripts/providers/*.sh

      - name: Skill check
        run: bash scripts/skill-check.sh

      - name: Route check
        run: bash scripts/route-check.sh

      - name: Docs link check
        run: bash scripts/docs-link-check.sh

      - name: OpenSpec conflict check
        run: bash scripts/openspec-conflict-check.sh
